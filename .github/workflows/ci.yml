name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust engine (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ALSA headers (cpal on Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  flutter-analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  build:
    name: Build (${{ matrix.name }})
    needs: [rust, flutter-analyze]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            build: flutter build macos --debug
          - name: Windows
            os: windows-latest
            build: flutter build windows --debug
          - name: Android
            os: ubuntu-latest
            build: flutter build apk --debug
          - name: iOS
            os: macos-14
            build: flutter build ios --debug --no-codesign
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Set up Java (Android)
        if: matrix.name == 'Android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: flutter pub get
      - run: ${{ matrix.build }}
      - name: Integration test (real engine, headless-driven GUI)
        if: matrix.name == 'macOS'
        run: flutter test integration_test -d macos

  # Housekeeping: catches "merged but never released" states. A release only
  # fires when main carries an UNTAGGED pubspec version (see release.yml) —
  # this job warns on PRs that ship code without a version bump and fails
  # the main run outright when that state actually lands (the mastering
  # chain #28–#33 merged exactly like that and nobody got a release).
  housekeeping:
    name: Housekeeping (version bump)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # tags + merge-base diffs
      - name: Version must count upwards and be bumped for shipping changes
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          # Verdicts go to stdout (the step log) AND the job summary — a log
          # that only shows the script and no result is useless to read.
          note() { echo "$*" | tee -a "$GITHUB_STEP_SUMMARY"; }

          VERSION=$(sed -n 's/^version: \([0-9][0-9.]*\).*/\1/p' pubspec.yaml)
          if [ -z "$VERSION" ]; then
            note "❌ pubspec.yaml has no parsable 'version:' line"
            echo "::error file=pubspec.yaml::no parsable 'version:' line"
            exit 1
          fi
          LATEST=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -1)
          echo "pubspec version: $VERSION"
          echo "latest tag:      v${LATEST:-none}"
          echo "event:           $EVENT"

          if ! git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            # Untagged version → merging releases it. It must be an increase.
            if [ -n "$LATEST" ]; then
              HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -1)
              if [ "$HIGHEST" != "$VERSION" ]; then
                note "❌ version $VERSION is not above the latest tag v$LATEST — releases must count upwards"
                echo "::error file=pubspec.yaml::version $VERSION is not above the latest tag v$LATEST — releases must count upwards"
                exit 1
              fi
            fi
            note "✅ version $VERSION is untagged — merging to main releases v$VERSION (latest tag: v${LATEST:-none})"
            exit 0
          fi

          # Version already tagged → merging will NOT release. Fine for
          # docs/CI-only changes; anything else needs a bump somewhere in
          # the chain before it reaches main.
          if [ "$EVENT" = "pull_request" ]; then
            RANGE="$BASE_SHA...HEAD"
          else
            RANGE="v$VERSION..HEAD"
          fi
          echo "diff range:      $RANGE (shipping files = everything except *.md, docs/, .github/)"
          CHANGED=$(git diff --name-only "$RANGE" -- . ':!*.md' ':!docs' ':!.github' || true)
          if [ -z "$CHANGED" ]; then
            note "✅ version $VERSION already tagged, but only docs/CI changed — no bump needed"
            exit 0
          fi
          MSG="pubspec version $VERSION is already tagged as v$VERSION: these code changes will NOT produce a release. Bump pubspec.yaml (this PR or the last PR of the chain)."
          {
            echo "⚠️ $MSG"
            echo ""
            echo "Shipping files changed without a bump:"
            echo '```'
            echo "$CHANGED" | head -30
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "⚠️ $MSG"
          echo "shipping files changed without a bump ($(echo "$CHANGED" | wc -l | tr -d ' ')):"
          echo "$CHANGED" | head -30
          if [ "$EVENT" = "pull_request" ]; then
            # Warning only: intermediate PRs of a stacked chain are allowed
            # to ship without a bump as long as the chain's last PR bumps.
            echo "::warning file=pubspec.yaml::$MSG"
          else
            echo "::error file=pubspec.yaml::$MSG"
            exit 1
          fi
