name: Auto-merge

# Arms GitHub's auto-merge (squash) on every non-draft PR that targets main,
# so PRs merge themselves as soon as the required CI checks pass. Open a PR
# as a DRAFT to opt out (mark "ready for review" later to arm it then).
#
# Needs the AUTOMERGE_TOKEN secret: a fine-grained PAT with Contents and
# Pull requests read/write for this repo. The default GITHUB_TOKEN must NOT
# be used here — a merge attributed to github-actions[bot] does not trigger
# other workflows, so the tag-and-release run on main would silently skip.
# Until the secret exists this job just logs a warning.

on:
  pull_request:
    # 'edited' also fires when a stacked PR is retargeted to main after its
    # predecessor merges and its branch is auto-deleted.
    types: [opened, ready_for_review, edited]

permissions: {}

# Per PR: the 'edited' trigger can fire twice in quick succession (retarget +
# title edit) and arming auto-merge twice is pointless.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    # Base guard: never arm a PR that still targets another feature branch —
    # auto-merging those merges into the stack, not into main.
    if: github.event.pull_request.base.ref == 'main' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::AUTOMERGE_TOKEN secret not set — auto-merge not armed"
            exit 0
          fi
          gh pr merge --auto --squash "$PR_URL" \
            || echo "::warning::could not arm auto-merge (already armed, or checks already green — merge manually)"
