name: Release

# Two entry points:
#  - push to main: if pubspec.yaml's version has no v<version> tag yet, this
#    run creates the tag and publishes the release (so every merged PR that
#    bumps the version ships automatically; docs-only PRs without a bump
#    skip). The tag is created with GITHUB_TOKEN, which deliberately does
#    NOT trigger a second run — this same run builds the artifacts.
#  - manual tag push (v*): builds and publishes for that tag as before.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Determine release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: check
        name: Tag main when the pubspec version is unreleased
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version=$(sed -n 's/^version: \([0-9][0-9.]*\).*/\1/p' pubspec.yaml)
          if [[ -z "$version" ]]; then
            echo "::error::no version found in pubspec.yaml"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v$version" > /dev/null; then
            echo "v$version already released — nothing to do"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$version"
            git push origin "v$version"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: version
    if: needs.version.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            build: flutter build macos --release
            package: ditto -c -k --keepParent build/macos/Build/Products/Release/durecmix.app durecmix-${{ needs.version.outputs.tag }}-macos.zip
            artifact: durecmix-${{ needs.version.outputs.tag }}-macos.zip
          - name: Windows
            os: windows-latest
            build: flutter build windows --release
            package: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath durecmix-${{ needs.version.outputs.tag }}-windows.zip
            artifact: durecmix-${{ needs.version.outputs.tag }}-windows.zip
          - name: Android
            os: ubuntu-latest
            build: flutter build apk --release
            package: cp build/app/outputs/flutter-apk/app-release.apk durecmix-${{ needs.version.outputs.tag }}-android.apk
            artifact: durecmix-${{ needs.version.outputs.tag }}-android.apk
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Set up Java (Android)
        if: matrix.name == 'Android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up release signing (Android)
        # Stable keystore from secrets — APKs signed with it can UPDATE an
        # existing installation. Without the secrets the build falls back to
        # a runner-generated debug key (installable, but not update-capable),
        # hence the hard failure to avoid shipping such an artifact again.
        if: matrix.name == 'Android'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret missing — refusing to release a debug-signed APK"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/release.keystore
          {
            echo "storeFile=../release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=durecmix"
          } > android/key.properties
      - run: flutter pub get
      - run: ${{ matrix.build }}
      - run: ${{ matrix.package }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: [version, build]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            durecmix-*.zip
            durecmix-*.apk
